services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: donelist:latest
    container_name: donelist
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Persist the SQLite database outside the container
      - donelist_data:/app/data
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_PATH: /app/data/donelist.db
      # Override with a strong random secret in production:
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  donelist_data:
    driver: local
